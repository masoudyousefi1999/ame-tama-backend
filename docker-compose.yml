version: '3.9'

services:
  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - private-network
      - db-network
      - public-network

networks:
  private-network:
    name: private-network
  public-network:
    external: true
  db-network:
    external: true
